tipo-de-veiculo-autonomo-com-arduino-e-desvio-de-obstaculos&quot;,&quot;title&quot;:&quot;\u003Ca href=\u0022\/job\/desenvolvimento-de-prototipo-de-veiculo-autonomo-com-arduino-e-desvio-de-obstaculos?ref=projects_1\u0022 target=\u0022_blank\u0022 rel=\u0022noopener\u0022\u003E\u003Cspan title=\u0022Desenvolvimento de Prot\u00f3tipo de Ve\u00edculo Aut\u00f4nomo com Arduino e Desvio de Obst\u00e1culos\u0022\u003EDesenvolvimento de Prot\u00f3tipo de Ve\u00edculo Aut\u00f4nomo com Arduino e Desv...\u003C\/span\u003E\u003C\/a\u003E&quot;,&quot;url&quot;:&quot;#&quot;,&quot;authorName&quot;:&quot;M. F. B. D. C.&quot;,&quot;description&quot;:&quot;Estamos buscando um freelancer experiente para desenvolver um prot\u00f3tipo funcional de ve\u00edculo aut\u00f4nomo. O projeto consiste em criar um rob\u00f4 baseado em um chassi 2WD, utilizando Arduino Uno como unidade de controle principal. O objetivo \u00e9 que o rob\u00f4 seja capaz de navegar de um ponto inicial (Pi) a um ponto final (Pf) predefinidos, preferencialmente seguindo uma trajet\u00f3ria retil\u00ednea, mas com a capacidade de detectar, dimensionar e contornar obst\u00e1culos, retornando \u00e0 linha de visada at\u00e9 o destino ap\u00f3s o \u003Ca href=\u0022http:\/\/desvio.Para\u0022 target=\u0022_blank\u0022 class=\u0022js-check-for-external\u0022 rel=\u0022nofollow noopener\u0022\u003Edesvio.Para\u003C\/a\u003E a montagem e implementa\u00e7\u00e3o, ser\u00e3o utilizados os seguintes recursos:\u003Cbr\/\u003E\n- Kit 2WD Arduino Car\u003Cbr\/\u003E\n- Arduino Uno\u003Cbr\/\u003E\n- Dois motores DC\u003Cbr\/\u003E\n- M\u00f3dulo L298N para acionamento dos motores\u003Cbr\/\u003E\n- Bateria de 9 V e pilhas em s\u00e9rie para alimenta\u00e7\u00e3o\u003Cbr\/\u003E\n- Interruptor geral\u003Cbr\/\u003E\n- M\u00f3dulo sensor ultrass\u00f4nico HC-SR04 na parte frontal para detec\u00e7\u00e3o de obst\u00e1culos \u00e0 frente\u003Cbr\/\u003E\n- M\u00f3dulos sensores de linha LM393 posicionados nas laterais para identificar a presen\u00e7a ou aus\u00eancia de obst\u00e1culos durante o contorno.\u003Cbr\/\u003E\nA l\u00f3gica de funcionamento do rob\u00f4 deve ser dividida em tr\u00eas modos principais:\u003Cbr\/\u003E\n1.\u0026nbsp; Movimento Retil\u00edneo: O rob\u00f4 deve seguir em frente, mantendo a dire\u00e7\u00e3o do alvo e monitorando continuamente a dist\u00e2ncia percorrida.\u003Cbr\/\u003E\n2.\u0026nbsp; Desvio de Obst\u00e1culos: Ao detectar um obst\u00e1culo frontal com o HC-SR04, o sistema deve parar, entrar neste modo e verificar qual lateral est\u00e1 livre utilizando os sensores LM393. Em seguida, deve definir o lado de desvio, executar o giro necess\u00e1rio e contornar o obst\u00e1culo.\u003Cbr\/\u003E\n3.\u0026nbsp; Corre\u00e7\u00e3o de Rota: Ap\u00f3s ultrapassar o obst\u00e1culo, o rob\u00f4 deve recalcular o \u00e2ngulo necess\u00e1rio para voltar \u00e0 dire\u00e7\u00e3o do ponto final e retomar o deslocamento em linha reta.\u003Cbr\/\u003E\nA execu\u00e7\u00e3o do projeto tamb\u00e9m deve considerar a calibra\u00e7\u00e3o precisa do deslocamento e dos giros. As rodas possuem 65 mm de di\u00e2metro e um disco com 20 marca\u00e7\u00f5es, o que permite relacionar a contagem de rota\u00e7\u00f5es com a dist\u00e2ncia percorrida. Essa refer\u00eancia deve ser utilizada para controlar o avan\u00e7o e a rota\u00e7\u00e3o com maior precis\u00e3o.O resultado esperado \u00e9 uma vers\u00e3o funcional do ve\u00edculo aut\u00f4nomo, capaz de sair do ponto inicial, desviar de obst\u00e1culos de forma aut\u00f4noma e continuar o percurso at\u00e9 o ponto final com efici\u00eancia e precis\u00e3o.\u003Cbr \/\u003E\u003Cbr \/\u003E\u003Cstrong\u003ECategoria\u003C\/strong\u003E: TI e Programa\u00e7\u00e3o\u003Cbr \/\u003E\u003Cstrong\u003ESubcategoria\u003C\/strong\u003E: Outros\u003Cbr \/\u003E\u003Cstrong\u003ETamanho do projeto\u003C\/strong\u003E: M\u00e9dio\u003Cbr \/\u003E&quot;,&quot;isHourly&quot;:false,&quot;deadline&quot;:null,&quot;deadlineValue&quot;:&quot;&qu ou inserir dados espec\u00edficos em campos opcionais. O sistema deve ser capaz de interpretar e organizar essas informa\u00e7\u00f5es. 2. Upload M\u00faltiplo de Imagens: Capacidade de carregar v\u00e1rias fotos do im\u00f3vel de uma s\u00f3 vez. 3. Gera\u00e7\u00e3o Autom\u00e1tica de Apresenta\u00e7\u00f5es: Com um clique em \u0026#039;Gerar Apresenta\u00e7\u00e3o\u0026#039;, o aplicativo deve produzir um material elegante e profissional, pronto para envio. As apresenta\u00e7\u00f5es dever\u00e3o incluir Capa personalizada, Galeria de imagens organizada, Descri\u00e7\u00e3o detalhada do im\u00f3vel, Destaques e diferenciais, e Call to Action (CTA). Intelig\u00eancia Artificial (Diferenciais Chave): O app deve incorporar IA para automatizar e aprimorar o processo, incluindo: Interpreta\u00e7\u00e3o Autom\u00e1tica de Texto para identificar localiza\u00e7\u00e3o, pre\u00e7o, tipo de im\u00f3vel, caracter\u00edsticas, e diferenciais. An\u00e1lise e Identifica\u00e7\u00e3o de Ambientes em Fotos para reconhecer ambientes como fachada, sala, quartos, cozinha, banheiros, etc. Organiza\u00e7\u00e3o Autom\u00e1tica de Imagens para classificar e ordenar as fotos de forma l\u00f3gica e visualmente atraente. Gera\u00e7\u00e3o de Descri\u00e7\u00f5es Profissionais e Copy Comercial para criar textos persuasivos e informativos para as apresenta\u00e7\u00f5es. Sa\u00eddas e Compartilhamento: As apresenta\u00e7\u00f5es geradas dever\u00e3o ser disponibilizadas em m\u00faltiplos formatos e canais, como PDF profissional, Link web responsivo, Envio direto por WhatsApp, Envio por e-mail, e Op\u00e7\u00e3o de salvar a apresenta\u00e7\u00e3o dentro do pr\u00f3prio aplicativo. Armazenamento em Nuvem: O sistema deve integrar-se com solu\u00e7\u00f5es de armazenamento em nuvem para salvar im\u00f3veis, fotos e apresenta\u00e7\u00f5es de forma segura, e organizar automaticamente os dados por cidade e nome do im\u00f3vel (Exemplo: WP Energimob -\u0026gt; Salvador -\u0026gt; Casa X -\u0026gt; fotos, PDF, link). Gest\u00e3o de Conte\u00fado: O aplicativo deve oferecer busca r\u00e1pida de im\u00f3veis e apresenta\u00e7\u00f5es, funcionalidades de edi\u00e7\u00e3o para ajustes finos, op\u00e7\u00e3o de duplica\u00e7\u00e3o de im\u00f3veis para agilizar novos cadastros, e um hist\u00f3rico completo de materiais gerados. Extras: Incluir funcionalidade para copiar texto da descri\u00e7\u00e3o para o WhatsApp, e gera\u00e7\u00e3o de vers\u00f5es resumidas e vers\u00f5es detalhadas para investidores. O profissional dever\u00e1 ter experi\u00eancia comprovada em desenvolvimento mobile, integra\u00e7\u00e3o de ia, design de ux\/ui e solu\u00e7\u00f5es de cloud computing, com foco em entregar um produto de alta qualidade e performance.\u003Cbr \/\u003E\u003Cbr \/\u003E\u003Cstrong\u003ECategoria\u003C\/strong\u003E: TI e Programa\u00e7\u00e3o\u003Cbr \/\u003E\u003Cstrong\u003ESubcategoria\u003C\/strong\u003E: Programa\u00e7\u00e3o de Apps para Android, iOS e outros\u003Cbr \/\u003E\u003Cstrong\u003EQual \u00e9 o alcance do projeto?\u003C\/strong\u003E: Criar um novo aplicativo\u003Cbr \/\u003E&quot;,&quot;isHourly&quot;:false,&quot;deadline&quot;:null,&quot;deadlineValue&quot;:&quot;&quot;,&quot;isSearchFeatured&quot;:false,&quot;postedDate&quot;:&quot;h\u00e1 12 horas&quot;,&quot;lastEmployerMessage&quot;:null,&quot;isUrgent&quot;:false,&quot;projectClientPlanLabel&quot;:null,&quot;showMainDetails&quot;:true,&quot;showDescription&quot;:true,&quot;showSkills&quot;:true,&quot;skills&quot;:[{&quot;anchorText&quot;:&quot;Android&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana.com\/jobs?skills=android&quot;,&quot;isCertified&quot;:false,&quot;title&quot;:&quot;Trabalhos freelancer de Android&quot;},{&quot;anchorText&quot;:&quot;iOS&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana.com\/jobs?skills=ios&quot;,&quot;isCertified&quot;:false,&quot;title&quot;:&quot;Trabalhos freelancer de iOS&quot;},{&quot;anchorText&quot;:&quot;Kotlin&quot;,&quot;anchorL &quot;\u003Ca href=\u0022\/job\/desenvolvimento-de-aplicativo-movel-para-conexao-de-parceiros-de-estudo?ref=projects_1\u0022 target=\u0022_blank\u0022 rel=\u0022noopener\u0022\u003E\u003Cspan title=\u0022Desenvolvimento de Aplicativo M\u00f3vel para Conex\u00e3o de Parceiros de Estudo\u0022\u003EDesenvolvimento de Aplicativo M\u00f3vel para Conex\u00e3o de Parceiros de Es...\u003C\/span\u003E\u003C\/a\u003E&quot;,&quot;url&quot;:&quot;#&quot;,&quot;authorName&quot;:&quot;R. C.&quot;,&quot;description&quot;:&quot;Estamos buscando um desenvolvedor ou equipe para criar um aplicativo m\u00f3vel inovador que conecte pessoas interessadas em encontrar parceiros de estudo para praticar idiomas ou outras habilidades. O objetivo principal \u00e9 facilitar a intera\u00e7\u00e3o e o aprendizado colaborativo entre usu\u00e1rios com interesses em comum.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nFuncionalidades essenciais do aplicativo:\u003Cbr\/\u003E\n\u003Cbr\/\u003E\n1.\u0026nbsp; Cria\u00e7\u00e3o de Perfil de Usu\u00e1rio: Os usu\u00e1rios poder\u00e3o criar perfis detalhados, incluindo idiomas que desejam praticar (com n\u00edveis de profici\u00eancia), habilidades que querem aprender ou ensinar, disponibilidade de hor\u00e1rios e m\u00e9todos de estudo preferidos.\u003Cbr\/\u003E\n2.\u0026nbsp; Busca e Filtragem: Implementar um sistema de busca robusto que permita aos usu\u00e1rios encontrar parceiros com base em crit\u00e9rios como idioma, habilidade, n\u00edvel, localiza\u00e7\u00e3o e disponibilidade.\u003Cbr\/\u003E\n3.\u0026nbsp; Sistema de Matching: Desenvolver um algoritmo de sugest\u00e3o de parceiros que utilize os dados dos perfis para apresentar as melhores correspond\u00eancias aos usu\u00e1rios.\u003Cbr\/\u003E\n4.\u0026nbsp; Chat Integrado: Um sistema de mensagens dentro do aplicativo para que os parceiros possam se comunicar, planejar sess\u00f5es de estudo e trocar informa\u00e7\u00f5es.\u003Cbr\/\u003E\n5.\u0026nbsp; Agendamento de Sess\u00f5es: Ferramentas para agendar e gerenciar encontros de estudo, seja online (via chamadas de v\u00eddeo integradas ou links externos) ou presenciais.\u003Cbr\/\u003E\n6.\u0026nbsp; Avalia\u00e7\u00e3o e Feedback: Um sistema de avalia\u00e7\u00e3o e feedback para que os usu\u00e1rios possam classificar seus parceiros de estudo, promovendo uma comunidade confi\u00e1vel e de alta qualidade.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nO aplicativo deve ser desenvolvido para plataformas iOS e Android, com uma interface intuitiva e amig\u00e1vel. Buscamos um profissional com experi\u00eancia comprovada em desenvolvimento mobile e que possa nos auxiliar na arquitetura e implementa\u00e7\u00e3o da solu\u00e7\u00e3o.\u003Cbr \/\u003E\u003Cbr \/\u003E\u003Cstrong\u003ECategoria\u003C\/strong\u003E: TI e Programa\u00e7\u00e3o\u003Cbr \/\u003E\u003Cstrong\u003ESubcategoria\u003C\/strong\u003E: Programa\u00e7\u00e3o de Apps para Android, iOS e outros\u003Cbr \/\u003E\u003Cstrong\u003EQual \u00e9 o alcance do projeto?\u003C\/strong\u003E: Bug ou altera\u00e7\u00e3o pequena\u003Cbr \/\u003E&quot;,&quot;isHourly&quot;:false,&quot;deadline&quot;:null,&quot;deadlineValue&quot;:&quot;&quot;,&quot;isSearchFeatured&quot;:false,&quot;postedDate&quot;:&quot;h\u00e1 7 horas&quot;,&quot;lastEmployerMessage&quot;:&quot;Agora mesmo&quot;,&quot;isUrgent&quot;:false,&quot;projectClientPlanLabel&quot;:null,&quot;showMainDetails&quot;:true,&quot;showDescription&quot;:true,&quot;showSkills&quot;:true,&quot;skills&quot;:[{&quot;anchorText&quot;:&quot;Android&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana.com\/jobs?skills=android&quot;,&quot;isCertified&quot;:false,&quot;title&quot;:&quot;Trabalhos freelancer de Android&quot;},{&quot;anchorText&quot;:&quot;iOS&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana.com\/jobs?skills=ios&quot;,&quot;isCertified&quot;:false,&quot;title&quot;:&quot;Trabalhos freelancer de iOS&quot;},{&quot;anchorText&quot;:&quot;Java&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana. -mobile-endless-runner-3d-para-android-e-ios?ref=projects_1\u0022 target=\u0022_blank\u0022 rel=\u0022noopener\u0022\u003E\u003Cspan title=\u0022Desenvolvimento de Jogo Mobile Endless Runner 3d para Android e Ios\u0022\u003EDesenvolvimento de Jogo Mobile Endless Runner 3d para Android e Ios\u003C\/span\u003E\u003C\/a\u003E&quot;,&quot;url&quot;:&quot;#&quot;,&quot;authorName&quot;:&quot;M.&quot;,&quot;description&quot;:&quot;Estamos buscando um desenvolvedor experiente para criar um jogo mobile do tipo Endless Runner, similar a t\u00edtulos como Subway Surfers ou Temple Run. O projeto envolve o desenvolvimento completo de um jogo 3D otimizado para plataformas m\u00f3veis.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nDetalhes do Jogo:\u003Cbr\/\u003E\n- Jogo 3D com estilo visual low-poly ou cartoon (a ser definido).\u003Cbr\/\u003E\n- Personagem com corrida autom\u00e1tica para frente.\u003Cbr\/\u003E\n- Controles intuitivos baseados em gestos (swipe para pular, deslizar, virar esquerda\/direita).\u003Cbr\/\u003E\n- Gera\u00e7\u00e3o procedural de obst\u00e1culos e cen\u00e1rios para uma experi\u00eancia de jogo infinita.\u003Cbr\/\u003E\n- Implementa\u00e7\u00e3o de sistema de pontua\u00e7\u00e3o e recordes (high score).\u003Cbr\/\u003E\n- Inclus\u00e3o de power-ups e itens colecion\u00e1veis para enriquecer a jogabilidade.\u003Cbr\/\u003E\n- Monetiza\u00e7\u00e3o b\u00e1sica atrav\u00e9s de an\u00fancios (Unity Ads \/ AdMob) e potencial para compras dentro do aplicativo (in-app purchases).\u003Cbr\/\u003E\n- Telas essenciais: menu inicial, tela de game over, funcionalidade de pause e uma loja simples.\u003Cbr\/\u003E\n- Otimiza\u00e7\u00e3o rigorosa para garantir bom desempenho em uma ampla gama de dispositivos m\u00f3veis, incluindo aparelhos intermedi\u00e1rios.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nRequisitos T\u00e9cnicos:\u003Cbr\/\u003E\n- Desenvolvimento utilizando a vers\u00e3o mais recente do Unity.\u003Cbr\/\u003E\n- Gera\u00e7\u00e3o de builds para as plataformas Android e iOS.\u003Cbr\/\u003E\n- C\u00f3digo limpo, bem organizado e devidamente comentado para facilitar futuras manuten\u00e7\u00f5es e colabora\u00e7\u00f5es.\u003Cbr\/\u003E\n- Entrega do projeto completo com c\u00f3digo-fonte 100% funcional.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nEntreg\u00e1veis:\u003Cbr\/\u003E\n- Prot\u00f3tipo jog\u00e1vel inicial (primeiro milestone).\u003Cbr\/\u003E\n- Vers\u00e3o beta com todas as mec\u00e2nicas principais implementadas.\u003Cbr\/\u003E\n- Build final pronta para submiss\u00e3o \u00e0s lojas de aplicativos.\u003Cbr\/\u003E\n- Suporte para corre\u00e7\u00e3o de bugs por um per\u00edodo determinado ap\u00f3s a entrega final.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nDiferenciais Valorizados:\u003Cbr\/\u003E\n- Experi\u00eancia comprovada no desenvolvimento de jogos endless runner ou hyper-casual mobile.\u003Cbr\/\u003E\n- Portf\u00f3lio relevante com jogos publicados na Google Play ou App Store.\u003Cbr\/\u003E\n- Conhecimento aprofundado em otimiza\u00e7\u00e3o para mobile, princ\u00edpios de ui\/ux e integra\u00e7\u00e3o de plataformas de an\u00fancios.\u003Cbr\/\u003E\n- Disponibilidade para realizar ajustes e itera\u00e7\u00f5es ao longo do desenvolvimento.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nO projeto ser\u00e1 estruturado em milestones, com pagamentos por etapas, para assegurar transpar\u00eancia e seguran\u00e7a para ambas as partes. Buscamos um profissional que possa contribuir com sugest\u00f5es e ideias para tornar o jogo ainda mais divertido e envolvente.\u003Cbr \/\u003E\u003Cbr \/\u003E\u003Cstrong\u003ECategoria\u003C\/strong\u003E: TI e Programa\u00e7\u00e3o\u003Cbr \/\u003E\u003Cstrong\u003ESubcategoria\u003C\/strong\u003E: Programa\u00e7\u00e3o de Apps para Android, iOS e outros\u003Cbr \/\u003E\u003Cstrong\u003EQual \u00e9 o alcance do projeto?\u003C\/strong\u003E: Criar um novo aplicativo\u003Cbr \/\u003E&quot;,&quot;isHourly&quot;:false,&quot;deadline&quot;:null,&quot;deadlineValue&quot;:&quot;&quot;,&quot;isSearchFe
